<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宏宇新材单位换算计算器</title>
<style>
:root {
    --bg:#1a1a2e;--card:#16213e;--pri:#0fcece;--txt:#eaeaea;--bd:#0f3460;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);margin:0;padding:15px;line-height:1.6;}
.container{max-width:1200px;margin:0 auto;}
h1{text-align:center;color:var(--pri);margin-bottom:8px;font-size:clamp(1.4rem,4vw,2rem);}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:clamp(.8rem,2vw,.9em);}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;}
.card{background:var(--card);border-radius:14px;padding:20px 22px;border:1px solid var(--bd);box-shadow:0 4px 15px rgba(0,0,0,.25);}
.card h2{margin-top:0;color:var(--pri);border-bottom:1px solid var(--bd);padding-bottom:8px;font-size:clamp(1rem,2.5vw,1.2em);}

/* 每行：标签在上，输入+按钮在下 */
.row{margin-bottom:14px;}
.row label{display:block;font-size:clamp(.82rem,2vw,.88em);color:#bbb;margin-bottom:6px;}
.row .inp-bar{display:flex;gap:10px;align-items:center;}
.row input{flex:1;padding:14px 16px;border:1px solid var(--bd);border-radius:8px;background:var(--bg);color:var(--txt);font-size:clamp(1.1em,2.5vw,1.35em);letter-spacing:.3px;min-width:0;text-align:right;outline:none;transition:border-color .2s;}
.row input:focus{border-color:var(--pri);}
.row button{flex:0 0 68px;padding:14px 0;border:none;border-radius:8px;background:var(--pri);color:#fff;font-weight:700;font-size:clamp(.85em,2vw,.95em);cursor:pointer;transition:.15s;white-space:nowrap;}
.row button:hover{background:#0dbaba;transform:scale(1.04);}

.info-text{font-size:.78em;color:#888;margin:4px 0 12px 0;padding:6px 8px;background:rgba(255,255,255,.04);border-radius:4px;line-height:1.5;}

/* 移动端：按钮稍大方便戳 */
@media(max-width:480px){
    .card{padding:16px 14px;}
    .row input{padding:12px;font-size:1.05em;text-align:left;}
    .row button{flex:0 0 60px;padding:12px 0;}
}
</style>
</head>
<body>
<div class="container">
<h1>综合单位换算计算器</h1>
<p class="subtitle">基准国际通用值 | 派生板块联动</p>
<div class="grid">

<div class="card"><h2>压强 (基准: Pa)</h2><div id="c_pressure"></div></div>
<div class="card"><h2>长度/直径 (基准: mm)</h2><div id="c_length"></div></div>
<div class="card"><h2>流量 (基准: ml/s)</h2><div id="c_flow"></div></div>
<div class="card"><h2>圆面积 (D=长度板直径)</h2><p class="info-text">A=π·(d/2)²</p><div id="c_area"></div></div>
<div class="card"><h2>圆孔单位面积流量</h2><p class="info-text">Q/A</p><div id="c_areaFlow"></div></div>
<div class="card"><h2>单位面积 &amp; 压强流量</h2><p class="info-text">(Q/A)/P_kPa</p><div id="c_apf"></div></div>

</div>
</div>

<script>
/* ========== 系数语义 ==========
   基准值 base | 某单位 coeff = "1 基准 = X 该单位"
   显示 = base × coeff | 回写 base = 输入 ÷ coeff
*/

const pressure = {
    units: {
        Pa:      ['帕斯卡 (Pa)',        1],
        Kpa:     ['千帕 (Kpa)',         1e-3],
        Mpa:     ['兆帕 (Mpa)',         1e-6],
        bar:     ['巴 (bar)',           1e-5],
        mbar:    ['毫巴 (mbar)',        0.01],
        water_m: ['水深压力 (m)',       1e-4],
    }
};

const length = {
    units: {
        mm: ['毫米 (mm)',  1],
        cm: ['厘米 (cm)',  0.1],
        dm: ['分米 (dm)',  0.01],
        m:  ['米 (m)',     0.001],
    }
};

const flow = {
    units: {
        ml_s:  ['毫升/秒 (ml/s)',  1],
        L_H:   ['升/小时 (L/H)',   3.6],
        mm3_s: ['立方毫米/秒 (mm³/s)', 1000],
        ml_min:['毫升/分 (ml/min)', 60],
    }
};

const areaUnits = {
    mm2: ['平方毫米 (mm²)', 1],
    cm2: ['平方厘米 (cm²)', 0.01],
    dm2: ['平方分米 (dm²)', 1e-4],
    m2:  ['平方米 (m²)',    1e-6],
};

const areaFlowUnits = {
    ml_s_mm2:   ['ml/s/mm²',       1],
    L_H_cm2:    ['L/H/cm²',        360],
    mm3_s_mm2:  ['mm³/s/mm²',      1000],
    ml_min_cm2: ['ml/min/cm²',     6000],
};

const apfUnits = {
    ml_s_mm2_kpa:  ['ml/s/mm²/Kpa',    1],
    L_H_cm2_kpa:   ['L/H/cm²/Kpa',     360],
    mm3_s_mm2_kpa: ['mm³/s/mm²/Kpa',   1000],
    ml_min_cm2_kpa:['ml/min/cm²/Kpa',  6000],
};

// ========== 状态 ==========
let S = {
    pressure: 100000,
    length: 1,
    flow: 1,
    area: Math.PI * 0.5 ** 2,
    areaFlow: 1 / (Math.PI * 0.5 ** 2),
    apf: 0,
};
(() => { const pk = S.pressure / 1000; S.apf = pk ? S.areaFlow / pk : 0; })();

// ========== 渲染 ==========
function renderCat(id, cfg) {
    const el = document.getElementById(id); if(!el) return;
    let h = '';
    for (const [k, [lab, coeff]] of Object.entries(cfg.units)) {
        h += `<div class="row" data-cat="${id}" data-key="${k}" data-coeff="${coeff}">
            <label>${lab}</label>
            <div class="inp-bar"><input type="number" step="any"><button onclick="conv(this)">转换</button></div>
        </div>`;
    }
    el.innerHTML = h;
}

function renderDerived(id, units) {
    const el = document.getElementById(id); if(!el) return;
    let h = '';
    for (const [k, [lab, coeff]] of Object.entries(units)) {
        h += `<div class="row" data-cat="${id}" data-key="${k}" data-coeff="${coeff}">
            <label>${lab}</label>
            <div class="inp-bar"><input type="number" step="any"><button onclick="conv(this)">转换</button></div>
        </div>`;
    }
    el.innerHTML = h;
}

// ========== 换算 ==========
function conv(btn) {
    const row = btn.closest('.row');
    const cat = row.dataset.cat, key = row.dataset.key;
    const inp = row.querySelector('input'), v = parseFloat(inp.value);
    if (isNaN(v)) { alert('请输入有效数值'); return; }

    if (cat === 'c_pressure') S.pressure = v / pressure.units[key][1];
    else if (cat === 'c_length')   S.length  = v / length.units[key][1];
    else if (cat === 'c_flow')     S.flow    = v / flow.units[key][1];
    else if (cat === 'c_area') {
        S.area = v / areaUnits[key][1];
        S.length = 2 * Math.sqrt(S.area / Math.PI);
    }
    else if (cat === 'c_areaFlow') {
        S.areaFlow = v / areaFlowUnits[key][1];
        S.flow = S.areaFlow * S.area;
    }
    else if (cat === 'c_apf') {
        S.apf = v / apfUnits[key][1];
        const pKpa = S.pressure / 1000;
        S.areaFlow = pKpa ? S.apf * pKpa : 0;
        S.flow = S.areaFlow * S.area;
    }

    cascade();
    updateAll();
}

function cascade() {
    S.area = Math.PI * (S.length / 2) ** 2;
    S.areaFlow = S.area ? S.flow / S.area : 0;
    const pKpa = S.pressure / 1000;
    S.apf = pKpa ? S.areaFlow / pKpa : 0;
}

// 格式化：toFixed(8) 后若小数部分全 0 则去掉
function fmt(n) {
    if (n === 0) return '0';
    if (!isFinite(n)) return 'NaN';
    const s = n.toFixed(8);
    // 若 ".00000000" 结尾则去掉
    return s.includes('.') ? s.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '') : s;
}

function updateAll() {
    // 基础
    const bases = {'c_pressure': S.pressure, 'c_length': S.length, 'c_flow': S.flow};
    for (const [id, base] of Object.entries(bases)) {
        const cfg = id === 'c_pressure' ? pressure : id === 'c_length' ? length : flow;
        document.querySelectorAll(`#${id} .row`).forEach(r => {
            r.querySelector('input').value = fmt(base * parseFloat(r.dataset.coeff));
        });
    }
    // 派生
    const maps = [
        ['c_area', areaUnits, S.area],
        ['c_areaFlow', areaFlowUnits, S.areaFlow],
        ['c_apf', apfUnits, S.apf],
    ];
    for (const [id, units, base] of maps) {
        document.querySelectorAll(`#${id} .row`).forEach(r => {
            r.querySelector('input').value = fmt(base * parseFloat(r.dataset.coeff));
        });
    }
}

// ========== 初始化 ==========
renderCat('c_pressure', pressure);
renderCat('c_length', length);
renderCat('c_flow', flow);
renderDerived('c_area', areaUnits);
renderDerived('c_areaFlow', areaFlowUnits);
renderDerived('c_apf', apfUnits);
updateAll();
</script>
</body>
</html>
